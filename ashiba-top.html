<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>足場プランナー</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c12;
    --surface: #131720;
    --accent: #00d4ff;
    --accent2: #f4a100;
    --text: #c8d0e0;
    --dim: #4a5468;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* グリッドアニメーション背景 */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  /* 光の粒子 */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    animation: float var(--dur) ease-in-out var(--delay) infinite;
  }
  @keyframes float {
    0%   { opacity:0; transform: translateY(100vh) translateX(0); }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { opacity:0; transform: translateY(-20px) translateX(var(--drift)); }
  }

  /* メインコンテンツ */
  .container {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px 60px;
    gap: 0;
  }

  /* 足場の図形アイコン */
  .scaffold-icon {
    width: 120px;
    height: 100px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  /* タイトル */
  .title-wrap {
    text-align: center;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.4s;
  }
  .title-en {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 14vw, 80px);
    letter-spacing: 6px;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 40px rgba(0,212,255,0.3);
  }
  .title-jp {
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--accent);
    margin-top: 6px;
    font-weight: 700;
  }

  /* バージョン */
  .version {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.5s;
  }

  /* 区切り線 */
  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.6s;
  }

  /* 機能リスト */
  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 340px;
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.7s;
  }
  .features .feature-item:last-child:nth-child(odd) {
    grid-column: 1 / -1;
    max-width: 160px;
    margin: 0 auto;
    width: 100%;
  }
  .feature-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(0,212,255,0.1);
    border-radius: 10px;
    padding: 14px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .feature-icon { font-size: 20px; flex-shrink: 0; }
  .feature-text {
    font-size: 11px;
    color: var(--text);
    line-height: 1.4;
    font-weight: 700;
  }

  /* はじめるボタン */
  .start-btn {
    position: relative;
    width: 100%;
    max-width: 320px;
    padding: 18px;
    background: var(--accent);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.9s;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(0,212,255,0.2);
  }
  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
  }
  .start-btn:active {
    transform: scale(0.97);
    box-shadow: 0 0 10px rgba(0,212,255,0.1);
  }
  .start-btn-sub {
    display: block;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    font-weight: 400;
    opacity: 0.7;
    margin-top: 2px;
  }

  /* 注意書き */
  .note {
    margin-top: 24px;
    font-size: 10px;
    color: var(--dim);
    text-align: center;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.0s;
  }

  /* 足場パターン装飾 */
  .scaffold-deco {
    position: fixed;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.04;
    pointer-events: none;
  }
  .scaffold-deco2 {
    position: fixed;
    left: -20px;
    top: 30%;
    transform: translateY(-50%) scaleX(-1);
    opacity: 0.04;
    pointer-events: none;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* 底部 */
  .bottom-info {
    position: fixed;
    bottom: 20px;
    left: 0; right: 0;
    text-align: center;
    font-size: 10px;
    color: var(--dim);
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.1s;
  }

  /* スキャンライン演出 */
  .scanline {
    position: fixed;
    top: -2px;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 4s ease-in-out infinite;
    opacity: 0.4;
    pointer-events: none;
  }
  @keyframes scan {
    0%   { top: -2px; opacity:0; }
    5%   { opacity: 0.6; }
    95%  { opacity: 0.3; }
    100% { top: 100dvh; opacity:0; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="scanline"></div>

<!-- パーティクル -->
<div class="particles" id="particles"></div>

<!-- 装飾 -->
<svg class="scaffold-deco" width="160" height="400" viewBox="0 0 160 400">
  <line x1="20" y1="0" x2="20" y2="400" stroke="#00d4ff" stroke-width="3"/>
  <line x1="80" y1="0" x2="80" y2="400" stroke="#00d4ff" stroke-width="3"/>
  <line x1="140" y1="0" x2="140" y2="400" stroke="#00d4ff" stroke-width="3"/>
  <line x1="0" y1="60" x2="160" y2="60" stroke="#00d4ff" stroke-width="2"/>
  <line x1="0" y1="140" x2="160" y2="140" stroke="#00d4ff" stroke-width="2"/>
  <line x1="0" y1="220" x2="160" y2="220" stroke="#00d4ff" stroke-width="2"/>
  <line x1="0" y1="300" x2="160" y2="300" stroke="#00d4ff" stroke-width="2"/>
  <line x1="0" y1="380" x2="160" y2="380" stroke="#00d4ff" stroke-width="2"/>
  <line x1="20" y1="60" x2="80" y2="140" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="80" y1="60" x2="20" y2="140" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="80" y1="140" x2="140" y2="220" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="140" y1="140" x2="80" y2="220" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="20" y1="220" x2="80" y2="300" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="80" y1="220" x2="20" y2="300" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="80" y1="300" x2="140" y2="380" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="140" y1="300" x2="80" y2="380" stroke="#00d4ff" stroke-width="1.5"/>
</svg>
<svg class="scaffold-deco2" width="160" height="400" viewBox="0 0 160 400">
  <line x1="20" y1="0" x2="20" y2="400" stroke="#00d4ff" stroke-width="3"/>
  <line x1="80" y1="0" x2="80" y2="400" stroke="#00d4ff" stroke-width="3"/>
  <line x1="140" y1="0" x2="140" y2="400" stroke="#00d4ff" stroke-width="3"/>
  <line x1="0" y1="60" x2="160" y2="60" stroke="#00d4ff" stroke-width="2"/>
  <line x1="0" y1="140" x2="160" y2="140" stroke="#00d4ff" stroke-width="2"/>
  <line x1="0" y1="220" x2="160" y2="220" stroke="#00d4ff" stroke-width="2"/>
  <line x1="0" y1="300" x2="160" y2="300" stroke="#00d4ff" stroke-width="2"/>
  <line x1="20" y1="60" x2="80" y2="140" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="80" y1="60" x2="20" y2="140" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="80" y1="140" x2="140" y2="220" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="140" y1="140" x2="80" y2="220" stroke="#00d4ff" stroke-width="1.5"/>
</svg>

<div class="container">

  <!-- 足場アイコン（SVG） -->
  <svg class="scaffold-icon" viewBox="0 0 120 100" fill="none">
    <!-- 建地 -->
    <line x1="20" y1="10" x2="20" y2="90" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="10" x2="60" y2="90" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="10" x2="100" y2="90" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
    <!-- 布板 -->
    <line x1="15" y1="30" x2="65" y2="30" stroke="#f4a100" stroke-width="4" stroke-linecap="round"/>
    <line x1="55" y1="30" x2="105" y2="30" stroke="#f4a100" stroke-width="4" stroke-linecap="round"/>
    <line x1="15" y1="60" x2="65" y2="60" stroke="#f4a100" stroke-width="4" stroke-linecap="round"/>
    <line x1="55" y1="60" x2="105" y2="60" stroke="#f4a100" stroke-width="4" stroke-linecap="round"/>
    <!-- ブレス -->
    <line x1="20" y1="30" x2="60" y2="60" stroke="#00d4ff88" stroke-width="1.5"/>
    <line x1="60" y1="30" x2="20" y2="60" stroke="#00d4ff88" stroke-width="1.5"/>
    <line x1="60" y1="30" x2="100" y2="60" stroke="#00d4ff88" stroke-width="1.5"/>
    <line x1="100" y1="30" x2="60" y2="60" stroke="#00d4ff88" stroke-width="1.5"/>
    <!-- 支柱の丸 -->
    <circle cx="20" cy="30" r="4" fill="#00d4ff"/>
    <circle cx="60" cy="30" r="4" fill="#00d4ff"/>
    <circle cx="100" cy="30" r="4" fill="#00d4ff"/>
    <circle cx="20" cy="60" r="4" fill="#00d4ff"/>
    <circle cx="60" cy="60" r="4" fill="#00d4ff"/>
    <circle cx="100" cy="60" r="4" fill="#00d4ff"/>
  </svg>

  <div class="title-wrap">
    <div class="title-en">ASHIBA</div>
    <div class="title-en" style="color:var(--accent); font-size: clamp(36px,9vw,55px); letter-spacing:3px;">PLANNER</div>
    <div class="title-jp">足　場　プ　ラ　ン　ナ　ー</div>
  </div>

  <div class="version">ver 0.1.0 β</div>
  <div class="divider"></div>

  <div class="features">
    <div class="feature-item">
      <div class="feature-icon">✏️</div>
      <div class="feature-text">平面図作成</div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">📦</div>
      <div class="feature-text">材料集計</div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">🔢</div>
      <div class="feature-text">人工計算</div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">📅</div>
      <div class="feature-text">人工管理</div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">🖨️</div>
      <div class="feature-text">印刷対応</div>
    </div>
  </div>

  <button class="start-btn" onclick="location.href='index.html'">
    START
    <span class="start-btn-sub">タップして開始</span>
  </button>

  <div class="note">
    足場職人のための現場管理ツール<br>
    iPhone / iPad 対応
  </div>

</div>

<div class="bottom-info">
  © 2025 Ashiba Planner — For scaffold professionals
</div>

<script>
// パーティクル生成
const container = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left: ${Math.random() * 100}%;
    --dur: ${4 + Math.random() * 8}s;
    --delay: ${Math.random() * 6}s;
    --drift: ${(Math.random() - 0.5) * 80}px;
    width: ${1 + Math.random() * 2}px;
    height: ${1 + Math.random() * 2}px;
    background: ${Math.random() > 0.5 ? '#00d4ff' : '#f4a100'};
  `;
  container.appendChild(p);
}
</script>
</body>
</html>
